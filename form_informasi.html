<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Form Informasi Pembeli</title>
	<link rel="icon" href="image/title_image.png" type="image/png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="form-shell">
		<header class="form-header">
			<img src="image/header_image.png" alt="Form header image">
			<div class="header-copy">
				<h1>Form Informasi Pembeli</h1>
			</div>
		</header>
    
		<form id="customerForm">
			<div class="field">
				<label for="salesName">Kode Sales :</label>
				<select id="salesName" name="sales_code" required>
					<option value="" selected disabled>Pilih kode sales</option>
				</select>
			</div>

			<div class="field">
				<label for="customerName">Nama Pembeli :</label>
				<input id="customerName" name="customer_name" type="text" placeholder="Masukan nama pembeli" required>
				<p class="hint">Ketik nama pembeli. Jika sudah ada, ID akan terisi otomatis.</p>
				<div id="customerSearchResults" class="customer-search-results" aria-live="polite"></div>
			</div>

			<div class="field">
				<label for="customerId">ID Pembeli :</label>
				<input id="customerId" name="customer_id" type="text" readonly>
				<p class="hint">Auto-generated (CST000001, CST000002, dst.)</p>
			</div>

			<div class="field">
				<label for="customerCategory">Kategori Pembeli :</label>
				<select id="customerCategory" name="customer_category" required>
					<option value="" selected disabled>Pilih kategori pembeli</option>
					<option value="retail">Retail</option>
					<option value="distributor">Distributor</option>
				</select>
			</div>

			<div class="field">
				<label for="contactMethod">Kontak Melalui :</label>
				<select id="contactMethod" name="contact_method" required>
					<option value="" selected disabled>Pilih kontak melalui</option>
					<option value="kanvasing">Kanvasing</option>
					<option value="call_telp_wa">Call (Telp / WA)</option>
				</select>
			</div>

			<section id="kanvasingFields">
				<div class="field">
					<label>Geolocation :</label>
					<div class="geo-box">
						<div class="geo-grid">
							<div>
								<span class="small-label">Latitude :</span>
								<input id="latitude" name="latitude" type="text" readonly>
							</div>
							<div>
								<span class="small-label">Longitude :</span>
								<input id="longitude" name="longitude" type="text" readonly>
							</div>
						</div>
						<button id="btnLocation" class="btn btn-location" type="button">GET LOCATION</button>
					</div>
				</div>

				<div class="field">
					<label for="address">Alamat Pembeli :</label>
					<textarea id="address" name="address" placeholder="Masukan alamat lokasi"></textarea>
				</div>

				<div class="field">
					<label for="photo">Foto Lokasi :</label>
					<input id="photo" name="photo" type="file" accept="image/*" capture="environment">
					<p class="hint">Ambil foto dari mobile/laptop. Maksimum 5MB.</p>
					<div class="photo-preview-wrap">
						<img id="photoPreview" alt="Photo preview">
					</div>
				</div>
			</section>

			<section id="callFields" hidden>
				<div class="field">
					<label for="callStreetAddress">Nama Jalan / Detail Alamat :</label>
					<input id="callStreetAddress" name="call_street_address" type="text" placeholder="Contoh: Jl. Merdeka No. 10">
				</div>

				<div class="field">
					<label for="callProvince">Provinsi :</label>
					<select id="callProvince" name="call_province">
						<option value="" selected disabled>Pilih provinsi</option>
					</select>
				</div>

				<div class="field">
					<label for="callCity">Kota / Kabupaten :</label>
					<select id="callCity" name="call_city">
						<option value="" selected disabled>Pilih kota/kabupaten</option>
					</select>
				</div>

				<div class="field">
					<label for="callDistrict">Kecamatan :</label>
					<select id="callDistrict" name="call_district">
						<option value="" selected disabled>Pilih kecamatan</option>
					</select>
				</div>

				<div class="field">
					<label for="callSubdistrict">Kelurahan :</label>
					<select id="callSubdistrict" name="call_subdistrict">
						<option value="" selected disabled>Pilih kelurahan</option>
					</select>
				</div>
			</section>

			<div class="field">
				<label for="phone">No Telp/WA :</label>
				<input id="phone" name="phone" type="text" placeholder="08...." required>
			</div>

			<div class="field">
				<label for="estimatedOmset">Perkiraan Omset Perbulan (Kg) :</label>
				<input id="estimatedOmset" name="estimated_omset_kg" type="number" min="0" step="0.01" value="0" required>
			</div>

			<hr class="divider">
			<button id="btnSubmit" class="btn btn-submit" type="submit">SUBMIT FORM</button>
			<button class="btn btn-clear" type="reset" style="margin-top: 8px;">CLEAR FORM</button>
			<a class="btn btn-clear" href="index.html" style="margin-top: 8px; display: block; text-align: center; text-decoration: none;">KEMBALI KE MENU</a>
			<p id="status" class="status" aria-live="polite"></p>
		</form>

		<footer class="form-footer">created by @GDC</footer>
	</main>

	<div id="successModalInformasi" class="success-modal" hidden>
		<div class="success-modal-backdrop" data-modal-close="true"></div>
		<div class="success-modal-card" role="dialog" aria-modal="true" aria-labelledby="successModalInformasiTitle">
			<h2 id="successModalInformasiTitle">Submit Berhasil</h2>
			<p id="successModalInformasiMessage">Data berhasil dikirim.</p>
			<button id="btnCloseSuccessInformasi" class="btn btn-submit" type="button">OK</button>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="config.js"></script>
	<script src="app.js"></script>
</body>
</html>
