<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login — Sales Form</title>
	<link rel="icon" href="image/title_image.png" type="image/png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="form-shell">
		<header class="form-header">
			<img src="image/header_image.png" alt="Form header image">
			<div class="header-copy">
				<h1>Login Sales Form</h1>
				<p>Masukan username dan password yang diberikan oleh admin.</p>
			</div>
		</header>

		<form id="loginForm">
			<div class="field">
				<label for="loginUsername">Username :</label>
				<input id="loginUsername" type="text" placeholder="Nama" required autocomplete="username">
			</div>

			<div class="field">
				<label for="loginPassword">Password :</label>
				<input id="loginPassword" type="password" placeholder="Password" required autocomplete="current-password">
			</div>

			<hr class="divider">
			<button id="btnLogin" class="btn btn-submit" type="submit">LOGIN</button>
			<p id="loginStatus" class="status" aria-live="polite"></p>
		</form>

		<footer class="form-footer">© 2026 CV. Panca Gemilang. All rights reserved. @GDC</footer>
	</main>

	<div id="loginErrorModal" class="success-modal" hidden>
		<div class="success-modal-backdrop"></div>
		<div class="success-modal-card" role="dialog" aria-modal="true" aria-labelledby="loginErrorTitle">
			<h2 id="loginErrorTitle" style="color: #d93025;">Login Gagal</h2>
			<p id="loginErrorMessage">Username atau password salah.</p>
			<button id="btnCloseLoginError" class="btn btn-submit" type="button" style="background: #d93025;">OK</button>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="config.js"></script>
	<script src="shared.js"></script>
	<script src="login.js"></script>
</body>
</html>
